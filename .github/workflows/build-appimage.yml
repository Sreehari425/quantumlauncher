name: Build AppImage

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-appimage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Download AppImage tool
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build quantum_launcher binary
        run: cargo build --release --package quantum_launcher

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
          mkdir -p AppDir/usr/share/applications
          cp target/release/quantum_launcher AppDir/usr/bin/
          cp assets/icon/512x512/ql_logo.png AppDir/usr/share/icons/hicolor/512x512/apps/io.github.QuantumLauncher.png
          cp assets/appimage/quantum-launcher.desktop AppDir/usr/share/applications/
          echo '#!/bin/sh' > AppDir/AppRun
          echo 'exec usr/bin/quantum_launcher "$@"' >> AppDir/AppRun
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: ./appimagetool-x86_64.AppImage AppDir

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantum_launcher.AppImage
          path: ./*.AppImage
