name: Build and Release Quantum Launcher AppImages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  BIN_NAME: quantum_launcher
  PROJECT_NAME: quantum_launcher

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-musl
            appimage_tool: appimagetool-x86_64.AppImage
            cross: false
          - arch: aarch64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-musl
            appimage_tool: appimagetool-aarch64.AppImage
            cross: false
          - arch: armv7
            runner: ubuntu-22.04
            rust_target: armv7-unknown-linux-musleabihf
            appimage_tool: appimagetool-armhf.AppImage
            cross: true
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.rust_target }}

      - name: Install cross for armv7
        if: matrix.cross
        run: cargo install cross --locked

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.runner }}-cargo-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.runner }}-cargo-${{ matrix.arch }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse2 musl-tools
          if [ "${{ matrix.cross }}" == "true" ]; then
            sudo apt-get install -y --no-install-recommends gcc-arm-linux-gnueabihf
          fi

      - name: Cache AppImage tool
        id: cache-appimagetool
        uses: actions/cache@v4
        with:
          path: ${{ matrix.appimage_tool }}
          key: ${{ matrix.runner }}-appimagetool-13-${{ matrix.arch }}

      - name: Download AppImage tool
        if: steps.cache-appimagetool.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/13/${{ matrix.appimage_tool }}
          chmod +x ${{ matrix.appimage_tool }}

      - name: Build quantum_launcher binary
        run: |
          if [ "${{ matrix.cross }}" == "true" ]; then
            cross build --release --package quantum_launcher --target ${{ matrix.rust_target }}
          else
            cargo build --release --package quantum_launcher --target ${{ matrix.rust_target }}
          fi

      - name: Verify .desktop file and icon
        run: |
          if [ ! -f assets/appimage/quantum-launcher.desktop ]; then
            echo "ERROR: assets/appimage/quantum-launcher.desktop not found!"
            exit 1
          fi
          if [ ! -f assets/icon/512x512/ql_logo.png ]; then
            echo "ERROR: assets/icon/512x512/ql_logo.png not found!"
            exit 1
          fi

      - name: Clean AppDir
        run: rm -rf AppDir || true

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp target/${{ matrix.rust_target }}/release/${{ env.BIN_NAME }} AppDir/usr/bin/
          cp assets/appimage/quantum-launcher.desktop AppDir/
          cp assets/appimage/quantum-launcher.desktop AppDir/usr/share/applications/
          convert assets/icon/512x512/ql_logo.png -resize 256x256 AppDir/usr/share/icons/hicolor/256x256/apps/quantum-launcher.png
          cp AppDir/usr/share/icons/hicolor/256x256/apps/quantum-launcher.png AppDir/quantum-launcher.png
          echo '#!/bin/sh' > AppDir/AppRun
          echo 'APPDIR=$(dirname "$0")' >> AppDir/AppRun
          echo 'exec $APPDIR/usr/bin/${{ env.BIN_NAME }} "$@"' >> AppDir/AppRun
          chmod +x AppDir/AppRun

      - name: Verify icon file
        run: |
          if [ ! -f AppDir/quantum-launcher.png ]; then
            echo "ERROR: AppDir/quantum-launcher.png not found!"
            exit 1
          fi
          file AppDir/quantum-launcher.png

      - name: Check binary architecture
        run: file AppDir/usr/bin/${{ env.BIN_NAME }}

      - name: Verify AppDir structure
        run: |
          echo "Listing AppDir contents:"
          find AppDir -type f
          if [ ! -f AppDir/AppRun ]; then
            echo "ERROR: AppRun not found!"
            exit 1
          fi
          if [ ! -f AppDir/usr/bin/${{ env.BIN_NAME }} ]; then
            echo "ERROR: ${{ env.BIN_NAME }} binary not found!"
            exit 1
          fi
          if [ ! -f AppDir/quantum-launcher.png ]; then
            echo "ERROR: quantum-launcher.png not found in AppDir!"
            exit 1
          fi

      - name: Build AppImage
        if: matrix.arch != 'armv7'
        run: ARCH=${{ matrix.arch }} ./${{ matrix.appimage_tool }} AppDir ${{ env.PROJECT_NAME }}-${{ matrix.arch }}.AppImage
        env:
          ARCH: ${{ matrix.arch }}

      - name: Build AppImage for armv7
        if: matrix.arch == 'armv7'
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: armhf
          distro: ubuntu20.04
          githubToken: ${{ github.token }}
          setup: |
            wget https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-armhf.AppImage
            chmod +x appimagetool-armhf.AppImage
          run: |
            ARCH=armv7 ./appimagetool-armhf.AppImage AppDir ${{ env.PROJECT_NAME }}-armv7.AppImage

      - name: Rename AppImage
        run: |
          if [ -f Quantum_Launcher-${{ matrix.arch }}.AppImage ]; then
            mv Quantum_Launcher-${{ matrix.arch }}.AppImage ${{ env.PROJECT_NAME }}-${{ matrix.arch }}.AppImage
            echo "Renamed Quantum_Launcher-${{ matrix.arch }}.AppImage to ${{ env.PROJECT_NAME }}-${{ matrix.arch }}.AppImage"
          fi
          if [ ! -f ${{ env.PROJECT_NAME }}-${{ matrix.arch }}.AppImage ]; then
            echo "ERROR: ${{ env.PROJECT_NAME }}-${{ matrix.arch }}.AppImage was not created!"
            exit 1
          fi
          echo "AppImage created successfully: ${{ env.PROJECT_NAME }}-${{ matrix.arch }}.AppImage"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.arch }}.AppImage
          path: ${{ env.PROJECT_NAME }}-${{ matrix.arch }}.AppImage
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release artifacts
        run: |
          mkdir dist
          for arch in x86_64 aarch64 armv7; do
            mv artifacts/${{ env.PROJECT_NAME }}-${arch}.AppImage/${{ env.PROJECT_NAME }}-${arch}.AppImage dist/
          done
          ls -l dist/

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/${{ env.PROJECT_NAME }}-x86_64.AppImage
            dist/${{ env.PROJECT_NAME }}-aarch64.AppImage
            dist/${{ env.PROJECT_NAME }}-armv7.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
