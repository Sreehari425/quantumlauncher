name: Build AppImage

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse2

      - name: Cache AppImage tool
        id: cache-appimagetool
        uses: actions/cache@v4
        with:
          path: appimagetool-x86_64.AppImage
          key: ${{ runner.os }}-appimagetool-13

      - name: Download AppImage tool
        if: steps.cache-appimagetool.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build quantum_launcher binary
        run: cargo build --release --package quantum_launcher

      - name: Verify .desktop file and icon
        run: |
          if [ ! -f assets/appimage/quantum-launcher.desktop ]; then
            echo "ERROR: assets/appimage/quantum-launcher.desktop not found!"
            exit 1
          fi
          if [ ! -f assets/icon/512x512/ql_logo.png ]; then
            echo "ERROR: assets/icon/512x512/ql_logo.png not found!"
            exit 1
          fi

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
          cp target/release/quantum_launcher AppDir/usr/bin/
          cp assets/appimage/quantum-launcher.desktop AppDir/
          cp assets/appimage/quantum-launcher.desktop AppDir/usr/share/applications/
          cp assets/icon/512x512/ql_logo.png AppDir/usr/share/icons/hicolor/512x512/apps/quantum-launcher.png
          cp assets/icon/512x512/ql_logo.png AppDir/quantum-launcher.png
          echo '#!/bin/sh' > AppDir/AppRun
          echo 'exec $APPDIR/usr/bin/quantum_launcher "$@"' >> AppDir/AppRun
          chmod +x AppDir/AppRun

      - name: Verify AppDir structure
        run: |
          echo "Listing AppDir contents:"
          find AppDir -type f
          if [ ! -f AppDir/AppRun ]; then
            echo "ERROR: AppRun not found!"
            exit 1
          fi
          if [ ! -f AppDir/usr/bin/quantum_launcher ]; then
            echo "ERROR: quantum_launcher binary not found!"
            exit 1
          fi

      - name: Build AppImage
        run: ./appimagetool-x86_64.AppImage AppDir

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Quantum_Launcher.AppImage
          path: Quantum_Launcher*.AppImage
          retention-days: 7
