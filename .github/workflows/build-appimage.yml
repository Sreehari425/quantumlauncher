name: Build and Release Quantum Launcher AppImages

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

env:
  BIN_NAME: quantum_launcher
  PROJECT_NAME: quantum_launcher

jobs:
  build_x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-x86_64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-x86_64-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse2 python3 python3-pip

      - name: Install appimage-builder
        run: pip install appimage-builder

      - name: Build quantum_launcher
        run: cargo build --release --package quantum_launcher

      - name: Verify .desktop file and icon
        run: |
          if [ ! -f assets/appimage/quantum-launcher.desktop ]; then
            echo "ERROR: assets/appimage/quantum-launcher.desktop not found!"
            exit 1
          fi
          if [ ! -f assets/icon/512x512/ql_logo.png ]; then
            echo "ERROR: assets/icon/512x512/ql_logo.png not found!"
            exit 1
          fi

      - name: Create AppImage recipe
        run: |
          cat > AppImageBuilder.yml <<EOF
          version: 1
          script:
            - rm -rf AppDir/*
            - mkdir -p AppDir/usr/bin
            - mkdir -p AppDir/usr/share/applications
            - mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
            - cp target/release/${{ env.BIN_NAME }} AppDir/usr/bin/
            - cp assets/appimage/quantum-launcher.desktop AppDir/
            - cp assets/appimage/quantum-launcher.desktop AppDir/usr/share/applications/
            - cp assets/icon/512x512/ql_logo.png AppDir/usr/share/icons/hicolor/512x512/apps/quantum-launcher.png
            - echo '#!/bin/sh' > AppDir/AppRun
            - echo 'exec \$APPDIR/usr/bin/${{ env.BIN_NAME }} "\$@"' >> AppDir/AppRun
            - chmod +x AppDir/AppRun
          AppDir:
            path: ./AppDir
            app_info:
              id: com.example.quantum_launcher
              name: quantum_launcher
              icon: quantum-launcher
              version: 1.0.0
              exec: AppRun
            apt:
              arch: amd64
              allow_unauthenticated: true
              sources:
                - sourceline: 'deb [trusted=yes] http://deb.debian.org/debian bookworm main'
              include:
                - libfuse2
                - libglib2.0-0
            test:
              fedora:
                image: fedora:37
                command: "./AppRun"
                use_host_x: true
          EOF

      - name: Build AppImage
        run: appimage-builder --recipe AppImageBuilder.yml

      - name: Rename AppImage
        run: |
          if [ -f Quantum_Launcher-x86_64.AppImage ]; then
            mv Quantum_Launcher-x86_64.AppImage ${{ env.PROJECT_NAME }}-x86_64.AppImage
            echo "Renamed Quantum_Launcher-x86_64.AppImage to ${{ env.PROJECT_NAME }}-x86_64.AppImage"
          fi
          if [ ! -f ${{ env.PROJECT_NAME }}-x86_64.AppImage ]; then
            echo "ERROR: ${{ env.PROJECT_NAME }}-x86_64.AppImage was not created!"
            exit 1
          fi
          echo "AppImage created successfully: ${{ env.PROJECT_NAME }}-x86_64.AppImage"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-x86_64.AppImage
          path: ${{ env.PROJECT_NAME }}-x86_64.AppImage
          retention-days: 7

  build_aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: aarch64-unknown-linux-gnu

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-aarch64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-aarch64-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse2 python3 python3-pip

      - name: Install appimage-builder
        run: pip install appimage-builder

      - name: Build quantum_launcher
        run: cargo build --release --package quantum_launcher --target aarch64-unknown-linux-gnu

      - name: Verify .desktop file and icon
        run: |
          if [ ! -f assets/appimage/quantum-launcher.desktop ]; then
            echo "ERROR: assets/appimage/quantum-launcher.desktop not found!"
            exit 1
          fi
          if [ ! -f assets/icon/512x512/ql_logo.png ]; then
            echo "ERROR: assets/icon/512x512/ql_logo.png not found!"
            exit 1
          fi

      - name: Create AppImage recipe
        run: |
          cat > AppImageBuilder.yml <<EOF
          version: 1
          script:
            - rm -rf AppDir/*
            - mkdir -p AppDir/usr/bin
            - mkdir -p AppDir/usr/share/applications
            - mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
            - cp target/aarch64-unknown-linux-gnu/release/${{ env.BIN_NAME }} AppDir/usr/bin/
            - cp assets/appimage/quantum-launcher.desktop AppDir/
            - cp assets/appimage/quantum-launcher.desktop AppDir/usr/share/applications/
            - cp assets/icon/512x512/ql_logo.png AppDir/usr/share/icons/hicolor/512x512/apps/quantum-launcher.png
            - echo '#!/bin/sh' > AppDir/AppRun
            - echo 'exec \$APPDIR/usr/bin/${{ env.BIN_NAME }} "\$@"' >> AppDir/AppRun
            - chmod +x AppDir/AppRun
          AppDir:
            path: ./AppDir
            app_info:
              id: com.example.quantum_launcher
              name: quantum_launcher
              icon: quantum-launcher
              version: 1.0.0
              exec: AppRun
            apt:
              arch: arm64
              allow_unauthenticated: true
              sources:
                - sourceline: 'deb [trusted=yes] http://deb.debian.org/debian bookworm main'
              include:
                - libfuse2
                - libglib2.0-0
            test:
              fedora:
                image: fedora:37
                command: "./AppRun"
                use_host_x: true
          EOF

      - name: Build AppImage
        run: appimage-builder --recipe AppImageBuilder.yml

      - name: Rename AppImage
        run: |
          if [ -f Quantum_Launcher-aarch64.AppImage ]; then
            mv Quantum_Launcher-aarch64.AppImage ${{ env.PROJECT_NAME }}-aarch64.AppImage
            echo "Renamed Quantum_Launcher-aarch64.AppImage to ${{ env.PROJECT_NAME }}-aarch64.AppImage"
          fi
          if [ ! -f ${{ env.PROJECT_NAME }}-aarch64.AppImage ]; then
            echo "ERROR: ${{ env.PROJECT_NAME }}-aarch64.AppImage was not created!"
            exit 1
          fi
          echo "AppImage created successfully: ${{ env.PROJECT_NAME }}-aarch64.AppImage"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-aarch64.AppImage
          path: ${{ env.PROJECT_NAME }}-aarch64.AppImage
          retention-days: 7

  build_armv7:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: armv7-unknown-linux-gnueabihf

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-armv7-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-armv7-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse2 python3 python3-pip gcc-arm-linux-gnueabihf

      - name: Install appimage-builder
        run: pip install appimage-builder

      - name: Build quantum_launcher
        run: |
          cargo build --release --package quantum_launcher --target armv7-unknown-linux-gnueabihf

      - name: Verify .desktop file and icon
        run: |
          if [ ! -f assets/appimage/quantum-launcher.desktop ]; then
            echo "ERROR: assets/appimage/quantum-launcher.desktop not found!"
            exit 1
          fi
          if [ ! -f assets/icon/512x512/ql_logo.png ]; then
            echo "ERROR: assets/icon/512x512/ql_logo.png not found!"
            exit 1
          fi

      - name: Create AppImage recipe
        run: |
          cat > AppImageBuilder.yml <<EOF
          version: 1
          script:
            - rm -rf AppDir/*
            - mkdir -p AppDir/usr/bin
            - mkdir -p AppDir/usr/share/applications
            - mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
            - cp target/armv7-unknown-linux-gnueabihf/release/${{ env.BIN_NAME }} AppDir/usr/bin/
            - cp assets/appimage/quantum-launcher.desktop AppDir/
            - cp assets/appimage/quantum-launcher.desktop AppDir/usr/share/applications/
            - cp assets/icon/512x512/ql_logo.png AppDir/usr/share/icons/hicolor/512x512/apps/quantum-launcher.png
            - echo '#!/bin/sh' > AppDir/AppRun
            - echo 'exec \$APPDIR/usr/bin/${{ env.BIN_NAME }} "\$@"' >> AppDir/AppRun
            - chmod +x AppDir/AppRun
          AppDir:
            path: ./AppDir
            app_info:
              id: com.example.quantum_launcher
              name: quantum_launcher
              icon: quantum-launcher
              version: 1.0.0
              exec: AppRun
            apt:
              arch: armhf
              allow_unauthenticated: true
              sources:
                - sourceline: 'deb [trusted=yes] http://deb.debian.org/debian bookworm main'
              include:
                - libfuse2
                - libglib2.0-0
            test:
              fedora:
                image: fedora:37
                command: "./AppRun"
                use_host_x: true
          EOF

      - name: Build AppImage
        run: appimage-builder --recipe AppImageBuilder.yml

      - name: Rename AppImage
        run: |
          if [ -f Quantum_Launcher-armhf.AppImage ]; then
            mv Quantum_Launcher-armhf.AppImage ${{ env.PROJECT_NAME }}-armv7.AppImage
            echo "Renamed Quantum_Launcher-armhf.AppImage to ${{ env.PROJECT_NAME }}-armv7.AppImage"
          fi
          if [ ! -f ${{ env.PROJECT_NAME }}-armv7.AppImage ]; then
            echo "ERROR: ${{ env.PROJECT_NAME }}-armv7.AppImage was not created!"
            exit 1
          fi
          echo "AppImage created successfully: ${{ env.PROJECT_NAME }}-armv7.AppImage"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-armv7.AppImage
          path: ${{ env.PROJECT_NAME }}-armv7.AppImage
          retention-days: 7

  release:
    needs: [build_x86_64, build_aarch64, build_armv7]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release artifacts
        run: |
          mkdir dist
          mv artifacts/${{ env.PROJECT_NAME }}-x86_64.AppImage/${{ env.PROJECT_NAME }}-x86_64.AppImage dist/
          mv artifacts/${{ env.PROJECT_NAME }}-aarch64.AppImage/${{ env.PROJECT_NAME }}-aarch64.AppImage dist/
          mv artifacts/${{ env.PROJECT_NAME }}-armv7.AppImage/${{ env.PROJECT_NAME }}-armv7.AppImage dist/
          ls -l dist/

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/${{ env.PROJECT_NAME }}-x86_64.AppImage
            dist/${{ env.PROJECT_NAME }}-aarch64.AppImage
            dist/${{ env.PROJECT_NAME }}-armv7.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
